<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <main class="admin">
      <div class="admin__container">
        <h1 class="admin__title">Админ-панель</h1>

        <section class="admin__gate" id="adminGate">
          <h2 class="admin__subtitle">Вход</h2>
          <form class="admin-form" id="adminLoginForm">
            <label class="admin-field">
              <div class="admin-field__label">Логин</div>
              <input class="admin-field__input" type="text" name="login" autocomplete="username" required />
            </label>

            <label class="admin-field">
              <div class="admin-field__label">Пароль</div>
              <input class="admin-field__input" type="password" name="password" autocomplete="current-password" required />
            </label>

            <div class="admin-form__error" id="adminLoginError"></div>

            <button class="admin-btn" type="submit">Войти</button>
          </form>
        </section>

        <section class="admin__app" id="adminApp" style="display: none">
          <div class="admin-layout">
            <aside class="admin-sidebar" aria-label="Навигация">
              <button class="admin-logout" id="adminLogoutBtn" type="button">Выйти</button>
              <button class="admin-tab" type="button" data-admin-tab="products">Товары</button>
              <button class="admin-tab" type="button" data-admin-tab="users">Пользователи</button>
              <button class="admin-tab" type="button" data-admin-tab="faq">FAQ</button>
              <button class="admin-tab" type="button" data-admin-tab="reviews">Отзывы</button>
              <button class="admin-tab" type="button" data-admin-tab="orders">Заказы</button>
            </aside>

            <div class="admin-content">
              <div class="admin-panel" data-admin-panel="products">
                <h2 class="admin__subtitle">Товары</h2>

                <form class="admin-form" id="adminCreateProductForm">
                  <label class="admin-field">
                    <div class="admin-field__label">Название</div>
                    <input class="admin-field__input" type="text" name="title" required />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Описание</div>
                    <textarea class="admin-field__input" name="description" rows="4"></textarea>
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Цена</div>
                    <input class="admin-field__input" type="text" name="price" required />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Старая цена</div>
                    <input class="admin-field__input" type="text" name="oldPrice" />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Картинка (URL/путь)</div>
                    <input class="admin-field__input" type="text" name="image" />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Категории (через запятую, с маленькой буквы)</div>
                    <input class="admin-field__input" type="text" name="categories" />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Теги (через запятую)</div>
                    <input class="admin-field__input" type="text" name="tags" />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Бейдж (если есть)</div>
                    <input class="admin-field__input" type="text" name="badge" />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Attributes (JSON)</div>
                    <textarea class="admin-field__input" name="attributes" rows="6"></textarea>
                  </label>

                  <div class="admin-form__error" id="adminCreateProductError"></div>

                  <button class="admin-btn" type="submit">Добавить товар</button>
                </form>

                <div class="admin-list" id="adminProductsList"></div>
              </div>

              <div class="admin-panel" data-admin-panel="users">
                <h2 class="admin__subtitle">Пользователи</h2>

                <form class="admin-form" id="adminCreateUserForm">
                  <label class="admin-field">
                    <div class="admin-field__label">Логин</div>
                    <input class="admin-field__input" type="text" name="login" required />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Пароль</div>
                    <input class="admin-field__input" type="text" name="password" required />
                  </label>

                  <div class="admin-form__error" id="adminCreateUserError"></div>

                  <button class="admin-btn" type="submit">Добавить пользователя</button>
                </form>

                <div class="admin-list" id="adminUsersList"></div>
              </div>

              <div class="admin-panel" data-admin-panel="faq">
                <h2 class="admin__subtitle">FAQ</h2>

                <form class="admin-form" id="adminCreateFaqForm">
                  <label class="admin-field">
                    <div class="admin-field__label">Вопрос</div>
                    <input class="admin-field__input" type="text" name="question" required />
                  </label>

                  <label class="admin-field">
                    <div class="admin-field__label">Ответ (каждый абзац с новой строки)</div>
                    <textarea class="admin-field__input" name="answer" rows="5" required></textarea>
                  </label>

                  <div class="admin-form__error" id="adminCreateFaqError"></div>

                  <button class="admin-btn" type="submit">Добавить вопрос</button>
                </form>

                <div class="admin-list" id="adminFaqList"></div>
              </div>

              <div class="admin-panel" data-admin-panel="orders">
                <h2 class="admin__subtitle">Заказы</h2>
                <div class="admin-list" id="adminOrdersList"></div>
              </div>

              <div class="admin-panel" data-admin-panel="reviews">
                <h2 class="admin__subtitle">Отзывы</h2>
                <div class="admin-list" id="adminReviewsList"></div>
              </div>
            </div>
          </div>
        </section>
     </div>
   </main>

    <script type="module" src="js/admin/adminPanel.js"></script>
  </body>
</html>
