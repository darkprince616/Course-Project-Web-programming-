<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Каталог</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-theme.css" />
    <link rel="stylesheet" href="css/auth-modal.css" />
    <link rel="stylesheet" href="css/booking-modal.css" />
    <link rel="stylesheet" href="css/catalog.css" />
  </head>

  <body>
    <header class="header"></header>

    <main>
      <section class="page catalog-page">
        <div class="container">
          <div class="section-head">
            <h2 class="section-head__title">Каталог</h2>
          </div>

          <div class="catalog-page__bar">
            <div id="catalogMeta" class="catalog-page__meta"></div>
            <div class="catalog-dropdown" data-catalog-category-dropdown aria-label="Фильтр по категории">
              <input type="hidden" id="catalogCategory" value="" />
              <button class="catalog-dropdown__btn" type="button" data-dropdown-button aria-haspopup="listbox" aria-expanded="false">
                <span class="catalog-dropdown__label" data-dropdown-label>Все категории</span>
                <img class="catalog-dropdown__chevron" src="assets/icons/chevron.svg" alt="chevron" />
              </button>
              <div class="catalog-dropdown__menu" data-dropdown-menu role="listbox"></div>
            </div>
          </div>

          <div id="catalogEmpty" class="catalog-page__empty">Товары не найдены.</div>
          <div class="offers__grid" id="catalogGrid"></div>
        </div>
      </section>
    </main>

    <footer class="footer" aria-label="Подвал"></footer>

    <script type="module" src="js/pages/catalog.js"></script>
  </body>
</html>
