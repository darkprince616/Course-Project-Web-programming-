<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет — Alpina Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-theme.css" />
    <link rel="stylesheet" href="css/auth-modal.css" />
    <link rel="stylesheet" href="css/booking-modal.css" />
    <link rel="stylesheet" href="css/a11y.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <header class="header"></header>

    <main>
      <section class="profile" aria-label="Личный кабинет">
        <div class="container">
          <div class="profile-head">
            <h1 class="profile__title">Личный кабинет</h1>
            <button class="profile-btn profile-btn--light" type="button" id="profileLogoutBtn" style="display: none">Выйти</button>
          </div>

          <div class="profile-gate" id="profileGate" style="display: none">
            <div class="profile-gate__text">
              Чтобы открыть личный кабинет, нужно войти в аккаунт.
            </div>
            <div class="profile-actions">
              <button class="profile-btn" type="button" id="profileLoginBtn">Войти</button>
              <a class="profile-btn profile-btn--light" href="index.html">На главную</a>
            </div>
          </div>

          <div class="profile-accordion" id="profileApp" style="display: none">
            <div class="profile-item" data-profile-item>
              <button class="profile-item__head" type="button" data-profile-toggle aria-expanded="true">
                <span class="profile-item__title">Персональные данные</span>
                <span class="profile-item__meta" id="profileSaved" aria-live="polite"></span>
                <span class="profile-item__chev" aria-hidden="true"></span>
              </button>
              <div class="profile-item__body" data-profile-body style="height: auto">
                <div class="profile-item__content">
                  <form id="profileForm">
                    <label class="profile-field">
                      <div class="profile-field__label">Имя и фамилия</div>
                      <input class="profile-field__input" type="text" name="fullName" />
                    </label>

                    <label class="profile-field">
                      <div class="profile-field__label">Телефон</div>
                      <input class="profile-field__input" type="tel" name="phone" />
                    </label>

                    <label class="profile-field">
                      <div class="profile-field__label">Email</div>
                      <input class="profile-field__input" type="email" name="email" />
                    </label>

                    <div class="profile-actions">
                      <button class="profile-btn" type="submit">Сохранить</button>
                    </div>

                    <div class="profile-error" id="profileError"></div>
                  </form>
                </div>
              </div>
            </div>

            <div class="profile-item" data-profile-item>
              <button class="profile-item__head" type="button" data-profile-toggle aria-expanded="false">
                <span class="profile-item__title">Адреса доставки</span>
                <span class="profile-item__meta" id="addressSaved" aria-live="polite"></span>
                <span class="profile-item__chev" aria-hidden="true"></span>
              </button>
              <div class="profile-item__body" data-profile-body>
                <div class="profile-item__content">
                  <form id="addressForm">
                    <label class="profile-field">
                      <div class="profile-field__label">Название (например, Дом / Офис)</div>
                      <input class="profile-field__input" type="text" name="label" />
                    </label>

                    <label class="profile-field">
                      <div class="profile-field__label">Город</div>
                      <input class="profile-field__input" type="text" name="city" required />
                    </label>

                    <label class="profile-field">
                      <div class="profile-field__label">Улица</div>
                      <input class="profile-field__input" type="text" name="street" required />
                    </label>

                    <label class="profile-field">
                      <div class="profile-field__label">Дом</div>
                      <input class="profile-field__input" type="text" name="house" required />
                    </label>

                    <label class="profile-field">
                      <div class="profile-field__label">Квартира</div>
                      <input class="profile-field__input" type="text" name="apartment" />
                    </label>

                    <div class="profile-actions">
                      <button class="profile-btn" type="submit">Добавить адрес</button>
                    </div>

                    <div class="profile-error" id="addressError"></div>
                  </form>

                  <div class="profile-list" id="addressList"></div>
                </div>
              </div>
            </div>

            <div class="profile-item" data-profile-item>
              <button class="profile-item__head" type="button" data-profile-toggle aria-expanded="false">
                <span class="profile-item__title">История заказов</span>
                <span class="profile-item__meta" id="ordersMeta" aria-live="polite"></span>
                <span class="profile-item__chev" aria-hidden="true"></span>
              </button>
              <div class="profile-item__body" data-profile-body>
                <div class="profile-item__content">
                  <div class="orders-tabs" aria-label="Статусы заказов">
                    <button class="orders-tab is-active" type="button" data-orders-tab="current">Текущие</button>
                    <button class="orders-tab" type="button" data-orders-tab="done">Выполненные</button>
                    <button class="orders-tab" type="button" data-orders-tab="canceled">Отменённые</button>
                  </div>

                  <div class="orders-list" id="ordersList"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer" aria-label="Подвал"></footer>

    <script type="module" src="js/pages/profile.js"></script>
  </body>
</html>
