<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Товар — Alpina Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-theme.css" />
    <link rel="stylesheet" href="css/auth-modal.css" />
    <link rel="stylesheet" href="css/booking-modal.css" />
    <link rel="stylesheet" href="css/product.css" />
  </head>

  <body>
    <header class="header"></header>

    <main>
      <section class="page">
        <div class="container">
          <div id="productError" class="product-error">Товар не найден.</div>

          <div id="productRoot"></div>

          <div id="productReviews" class="product-reviews">
            <div class="section-head product-reviews__head">
              <h2 class="section-head__title">Отзывы</h2>
            </div>

            <div id="reviewsList" class="reviews-list"></div>
            <div id="reviewsEmpty" class="reviews-empty">Отзывов пока нет.</div>

            <div class="review-accordion review-accordion--spaced">
              <div class="review-item" data-review-item>
                <button class="review-item__head" type="button" data-review-toggle aria-expanded="false">
                  <span class="review-item__title">Оставить отзыв</span>
                  <span class="review-item__meta" aria-live="polite"></span>
                  <span class="review-item__chev" aria-hidden="true"></span>
                </button>
                <div class="review-item__body" data-review-body>
                  <div class="review-item__content">
                    <form id="reviewForm" class="auth-form" autocomplete="off">
                      <label class="auth-field">
                        <div class="auth-field__label">Оценка</div>
                        <div class="review-stars" data-review-stars aria-label="Оценка"></div>
                        <input type="hidden" name="rating" required />
                      </label>

                      <label class="auth-field">
                        <div class="auth-field__label">Текст</div>
                        <textarea class="auth-field__input" name="text" rows="4" required></textarea>
                      </label>

                      <div class="auth-form__error" id="reviewFormError"></div>

                      <button class="auth-form__btn" type="submit">Отправить</button>
                      <div class="review-form-note">Отзыв появится после модерации.</div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer" aria-label="Подвал"></footer>

    <script type="module" src="js/pages/product.js"></script>
  </body>
</html>
