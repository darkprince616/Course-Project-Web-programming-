<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Корзина</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-theme.css" />
    <link rel="stylesheet" href="css/auth-modal.css" />
    <link rel="stylesheet" href="css/booking-modal.css" />
    <link rel="stylesheet" href="css/a11y.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>
  <body>
    <header class="header"></header>

    <main>
      <section class="cart">
        <div class="container">
          <div class="section-head">
            <h2 class="section-head__title">Корзина</h2>
          </div>

          <div id="cartEmpty" class="cart-empty">В корзине пока нет товаров.</div>

          <div id="cartList" class="cart-list"></div>

          <div id="cartSummary" class="cart-summary">
            <div class="cart-summary__row">
              <div class="cart-summary__label">Итого:</div>
              <div id="cartTotal" class="cart-summary__value">0 руб.</div>
            </div>

            <button id="checkoutBtn" class="auth-form__btn cart-summary__btn" type="button">Заказать</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer" aria-label="Подвал"></footer>

    <div class="checkout-modal" aria-label="Оформление заказа" role="dialog" aria-modal="true">
      <div class="checkout-modal__overlay" data-checkout-close></div>
      <div class="checkout-modal__panel">
        <div class="booking-modal__head">
          <div class="booking-modal__title">Оформление заказа</div>
          <button class="booking-modal__close" type="button" aria-label="Закрыть" data-checkout-close>×</button>
        </div>

        <div class="checkout-modal__body">
          <form id="checkoutForm" class="checkout-form" autocomplete="off">
            <label class="auth-field">
              <div class="auth-field__label">Имя</div>
              <input class="auth-field__input" type="text" name="name" required />
            </label>

            <label class="auth-field">
              <div class="auth-field__label">Телефон</div>
              <input class="auth-field__input" type="tel" name="phone" required />
            </label>

            <label class="auth-field">
              <div class="auth-field__label">Адрес доставки</div>
              <input class="auth-field__input" type="text" name="address" required />
            </label>

            <div class="checkout-form__total">
              <div class="checkout-form__total-label">Итого:</div>
              <div id="checkoutTotal" class="checkout-form__total-value">0 руб.</div>
            </div>

            <button class="auth-form__btn" type="submit">Оформить</button>
          </form>
        </div>
      </div>
    </div>

    <div class="checkout-success" aria-label="Заказ оформлен" role="dialog" aria-modal="true">
      <div class="checkout-success__overlay" data-checkout-success-close></div>
      <div class="checkout-success__panel">
        <div class="booking-modal__head">
          <div class="booking-modal__title"></div>
          <button class="booking-modal__close" type="button" aria-label="Закрыть" data-checkout-success-close>×</button>
        </div>
        <div class="checkout-success__body">
          <img class="checkout-success__icon" src="assets/icons/success.png" alt="" />
          <div class="checkout-success__title">Спасибо!</div>
          <div class="checkout-success__text">Заказ оформлен. Ожидайте звонка менеджера.</div>
        </div>
      </div>
    </div>

    <script type="module" src="js/pages/cart.js"></script>
  </body>
</html>
