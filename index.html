<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpina Market</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- Шапка (хедер) -->
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <nav class="nav">
                    <a href="#">Главная</a>
                    <a href="#">Каталог</a>
                    <a href="#">О нас</a>
                    <a href="#">Контакты</a>
                </nav>
                <div class="header__actions">
                    <span class="city">Санкт-Петербург</span>
                    <a href="tel:88007004024" class="phone">8 800 700 40 24</a>
                    <button class="btn-call">Позвонить или написать</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main>
        <!-- Секция с новогодним баннером -->
        <section class="hero">
            <div class="container">
                <h1>Новый год и новогодний праздник! <br> С Новым Годом и Новогодним Днём!</h1>
            </div>
        </section>

        <!-- Товары -->
        <section class="products">
            <div class="container">
                <h2>Белый стул</h2>
                <!-- Пиксель-эффект будет здесь -->
                <div id="pixel-effect" class="pixel-container">
                    <!-- Сюда позже добавим js логику -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
